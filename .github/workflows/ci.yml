name: CI

on:
  push:
    branches: [ main, view ]
  pull_request:
    branches: [ main, view ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --target PrinterTextParser_test

      - name: Run PrinterTextParser_test
        run: ./build/PrinterTextParser_test